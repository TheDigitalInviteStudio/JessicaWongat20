<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="logo.png">

    <meta name="title" content="JESSICA WONG @ 20" />

   <!-- Meta Tags Generated with https://metatags.io -->
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --espresso: #6a0510; 
            --bronze: #CD7F32;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--espresso);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. TRANSITION OVERLAY */
        #transition-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--espresso);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }

        /* 2. LOADER */
        #loader {
            position: fixed;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }

        .logo-circle {
            width: 120px; height: 120px;
            border: 1px solid var(--bronze);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            animation: pulse 2.5s infinite ease-in-out;
            padding: 15px; box-sizing: border-box;
        }

        .logo-circle img { width: 100%; height: auto; object-fit: contain; }

        @keyframes pulse {
            0%, 100% { transform: scale(0.98); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* 3. ENVELOPE SECTION */
        #splash-page {
            display: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            text-align: center;
        }

        .invited-header {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: #fbf7f7;
            margin-bottom: 25px;
        }

        .envelope-wrapper {
            position: relative;
            width: 90vw;
            max-width: 380px;
            height: 280px;
            perspective: 2500px; 
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .envelope-base {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            z-index: 1;
            transform: translateZ(0);
        }

        /* Using the exact class name from your HTML */
        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            z-index: 10; 
            transform: translateZ(1px); 
            transform-origin: center top;
            transform-style: preserve-3d;
            backface-visibility: visible; 
            transition: transform 2.0s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-base img, .envelope-flap img {
            width: 100%;
            height: auto;
            display: block;
        }

        #wax-seal {
            position: absolute;
            width: 75px; 
            top: 60%; 
            left: 50%;
            transform: translateX(-50%) translateZ(2px);
            z-index: 20;
            transition: opacity 1.5s ease-in-out;
        }

        /* OPEN STATE */
        .is-open .envelope-flap {
            transform: rotateX(160deg) translateZ(1px);
        }

        .is-open #wax-seal {
            opacity: 0;
        }

        .open-text {
            position: absolute; 
            bottom: 50px; 
            left: 50%;
            transform: translateX(-50%);
            color: #aa8844;
            font-family: 'Playfair Display', serif;
            letter-spacing: 3px; font-size: 0.75rem;
            z-index: 20; 
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>

    <div id="loader">
        <div class="logo-circle">
            <img src="logo.png" alt="Logo">
        </div> 
        <div style="margin-top:20px; color:var(--bronze); letter-spacing:5px; font-size:0.7rem;">PREPARING</div>
    </div>

    <div id="splash-page">
        <h1 class="invited-header">You are invited</h1>
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope-base">
                <img src="envelope-body.png" alt="Base">
            </div>
            
            <div class="envelope-flap">
                <img src="envelope.flap.png" alt="Flap">
                <img src="wax-seal.png" alt="Seal" id="wax-seal">
            </div>
            
            <div class="open-text">TAP TO OPEN</div>
        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const splash = document.getElementById('splash-page');
        const envelope = document.getElementById('envelope');
        const overlay = document.getElementById('transition-overlay');

        window.onload = function() {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    splash.style.display = 'block';
                    setTimeout(() => splash.style.opacity = '1', 50);
                }, 800);
            }, 2000);
        };

        if (envelope) {
            envelope.addEventListener('click', () => {
                envelope.classList.add('is-open');

                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 1800); 

                setTimeout(() => {
                    window.location.href = "https://letshenskidesign.my.canva.site/about-rio-sterling";
                }, 3000); 
            });
        }
    </script>
</body>
</html>
